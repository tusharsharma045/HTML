<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tushar's Audio Page</title>
  <style>
    body {
      background-color: #5881a4; /* Outside box background */
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: #ac6565;
      margin-top: 20px;
    }

    .audio-box {
      background-color: #d1e7dd; /* Box background */
      width: 1000px;
      height: 600px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .audio-box h2 {
      margin-top: 0;
      color: #1b4332;
    }
  </style>
</head>
<body>

  <h1>Tushar</h1>

  <div  style="align-items: center; justify-content: center ;" class="audio-box " >
    <h2>Audio Baksa</h2>
    <div style="width: 400px;padding-left: 250px;padding-top: 180px;">
    <audio controls>
      <source src="tushar.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    </div>
  </div>

</body>
</html>
